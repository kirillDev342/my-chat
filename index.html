<!DOCTYPE html>
<html>
<head>
    <title>Мой Чат</title>
    <style>
        body { margin: 0; background: #1a1a2e; font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #chat { width: 800px; height: 600px; background: white; border-radius: 10px; display: flex; flex-direction: column; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; background: #f5f5f5; }
        #input-area { padding: 20px; background: white; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 2px solid #ddd; border-radius: 5px; }
        input:focus { border-color: #4a9c4a; outline: none; }
        button { padding: 10px 20px; background: #4a9c4a; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #5dae5d; }
        #login { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a2e; display: flex; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 40px; border-radius: 10px; text-align: center; }
        .login-box h2 { margin-bottom: 20px; color: #333; }
        .login-box input { width: 100%; margin: 10px 0; padding: 10px; border: 2px solid #ddd; border-radius: 5px; }
        .error { color: #ff4444; margin-top: 10px; display: none; }
        .message { margin: 10px 0; padding: 10px; background: white; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .message .username { color: #4a9c4a; font-weight: bold; margin-right: 10px; }
        .message .time { color: #999; font-size: 11px; float: right; }
        #status { padding: 10px 20px; background: #f0f0f0; border-bottom: 1px solid #ddd; color: #666; }
    </style>
</head>
<body>
    <div id="login">
        <div class="login-box">
            <h2>Вход в чат</h2>
            <input type="text" id="username" placeholder="Твой ник" autofocus>
            <button onclick="joinChat()">Войти</button>
            <div id="loginError" class="error"></div>
        </div>
    </div>

    <div id="chat" style="display: none;">
        <div id="status">Подключение...</div>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="message" placeholder="Сообщение..." disabled>
            <button onclick="sendMessage()" id="sendBtn" disabled>Отправить</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io({
            reconnection: true,
            reconnectionAttempts: 5,
            reconnectionDelay: 1000
        });
        
        let username = '';
        let connected = false;

        // Статус подключения
        socket.on('connect', () => {
            console.log('✅ Подключено к серверу');
            document.getElementById('status').textContent = '🟢 Подключено';
            if (username) {
                socket.emit('join', username);
            }
        });

        socket.on('disconnect', () => {
            console.log('❌ Отключено от сервера');
            document.getElementById('status').textContent = '🔴 Отключено. Переподключение...';
        });

        socket.on('connect_error', (error) => {
            console.error('Ошибка подключения:', error);
            document.getElementById('status').textContent = '⚠️ Ошибка подключения';
            showError('Не удалось подключиться к серверу');
        });

        // Вход в чат
        function joinChat() {
            const input = document.getElementById('username');
            username = input.value.trim();
            
            if (!username) {
                showError('Введи свой ник!');
                return;
            }

            if (username.length < 2) {
                showError('Слишком короткое имя');
                return;
            }

            hideError();
            console.log('Пытаемся войти как:', username);
            
            socket.emit('join', username);
        }

        socket.on('join_success', () => {
            console.log('✅ Вход успешен');
            document.getElementById('login').style.display = 'none';
            document.getElementById('chat').style.display = 'flex';
            document.getElementById('message').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('message').focus();
        });

        socket.on('join_error', (error) => {
            console.error('❌ Ошибка входа:', error);
            showError(error || 'Ошибка входа');
        });

        // Получение сообщений
        socket.on('message', (data) => {
            console.log('📨 Сообщение:', data);
            addMessage(data);
        });

        function addMessage(data) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            
            const time = new Date().toLocaleTimeString();
            
            messageDiv.innerHTML = `
                <span class="username">${data.username}</span>
                <span class="time">${time}</span>
                <div>${data.text}</div>
            `;
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Отправка сообщений
        function sendMessage() {
            const input = document.getElementById('message');
            const text = input.value.trim();
            
            if (!text) return;
            
            console.log('📤 Отправка:', text);
            socket.emit('message', text);
            input.value = '';
        }

        // Обработка Enter
        document.getElementById('message').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        document.getElementById('username').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                joinChat();
            }
        });

        // Вспомогательные функции
        function showError(text) {
            const errorDiv = document.getElementById('loginError');
            errorDiv.textContent = text;
            errorDiv.style.display = 'block';
        }

        function hideError() {
            document.getElementById('loginError').style.display = 'none';
        }

        // Проверка соединения
        setInterval(() => {
            if (!socket.connected) {
                document.getElementById('status').textContent = '🔴 Отключено. Переподключение...';
            }
        }, 1000);
    </script>
</body>
</html>
