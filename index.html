<!DOCTYPE html>
<html>
<head>
    <title>Мессенджер PRO</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app {
            width: 1200px;
            height: 800px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
        }

        /* САЙДБАР */
        #sidebar {
            width: 300px;
            background: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
        }

        #sidebar-header {
            padding: 25px;
            background: #243342;
        }

        #sidebar-header h2 {
            color: #4a9c4a;
            margin-bottom: 20px;
        }

        #user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        #user-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #4a9c4a, #2ecc71);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        #user-info h4 {
            margin-bottom: 5px;
        }

        #user-status {
            font-size: 12px;
            color: #4a9c4a;
        }

        #online-users {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .online-title {
            color: #7f8c8d;
            font-size: 12px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 10px;
            margin: 5px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .user-item:hover {
            background: #34495e;
            transform: translateX(5px);
        }

        .user-item.active {
            background: #4a9c4a;
        }

        .user-avatar-small {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            font-size: 14px;
        }

        .user-dot {
            width: 8px;
            height: 8px;
            background: #4a9c4a;
            border-radius: 50%;
            margin-left: auto;
        }

        /* ОСНОВНОЙ ЧАТ */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f5f5f5;
        }

        #chat-header {
            padding: 20px 30px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #chat-info h3 {
            margin-bottom: 5px;
            color: #333;
        }

        #chat-info span {
            font-size: 12px;
            color: #7f8c8d;
        }

        #call-controls {
            display: flex;
            gap: 10px;
        }

        .call-btn {
            width: 45px;
            height: 45px;
            border: none;
            border-radius: 50%;
            background: #f0f0f0;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }

        .call-btn:hover {
            background: #4a9c4a;
            color: white;
            transform: scale(1.1);
        }

        #messages-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 15px;
            max-width: 70%;
            animation: slideIn 0.3s;
        }

        .message.own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            flex-shrink: 0;
        }

        .message-content {
            background: white;
            padding: 12px 18px;
            border-radius: 18px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .message.own .message-content {
            background: #4a9c4a;
            color: white;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
            font-size: 12px;
        }

        .message-author {
            font-weight: bold;
            color: #2c3e50;
        }

        .message.own .message-author {
            color: white;
        }

        .message-time {
            color: #95a5a6;
            font-size: 10px;
        }

        .message.own .message-time {
            color: rgba(255,255,255,0.7);
        }

        .message-text {
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .message-emoji {
            font-size: 32px;
        }

        .message-reactions {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }

        .reaction {
            background: rgba(0,0,0,0.05);
            border-radius: 12px;
            padding: 2px 8px;
            font-size: 12px;
            cursor: pointer;
        }

        #input-area {
            padding: 20px 30px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        #message-form {
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }

        #message-wrapper {
            flex: 1;
            background: #f0f0f0;
            border-radius: 24px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #message-input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 8px 0;
            max-height: 100px;
            resize: none;
            outline: none;
            font-size: 14px;
        }

        .input-actions {
            display: flex;
            gap: 10px;
        }

        .input-action {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #7f8c8d;
            transition: all 0.3s;
        }

        .input-action:hover {
            color: #4a9c4a;
            transform: scale(1.2);
        }

        #send-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: #4a9c4a;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        #send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(74,156,74,0.4);
        }

        /* ЭМОДЗИ ПИКЕР */
        #emoji-picker {
            position: absolute;
            bottom: 100px;
            right: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            padding: 10px;
            display: none;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
            z-index: 1000;
            max-height: 200px;
            overflow-y: auto;
        }

        .emoji-item {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 5px;
            font-size: 20px;
        }

        .emoji-item:hover {
            background: #f0f0f0;
        }

        /* ПАНЕЛЬ ЗВОНКА */
        #call-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: none;
            z-index: 2000;
        }

        #call-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #4a9c4a, #2ecc71);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 20px;
        }

        #call-name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        #call-status {
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        #call-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .call-action-btn {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            transition: all 0.3s;
        }

        .call-action-btn.accept {
            background: #4a9c4a;
            color: white;
        }

        .call-action-btn.reject {
            background: #ff4444;
            color: white;
        }

        .call-action-btn:hover {
            transform: scale(1.1);
        }

        /* ЭКРАН ВХОДА */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            text-align: center;
            animation: slideUp 0.5s;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card h1 {
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .login-input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .login-input:focus {
            border-color: #4a9c4a;
            outline: none;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #4a9c4a, #2ecc71);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(74,156,74,0.4);
        }

        .error {
            color: #ff4444;
            margin-top: 10px;
            display: none;
        }

        /* УВЕДОМЛЕНИЯ */
        #notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2c3e50;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 4000;
        }

        #notification.show {
            transform: translateX(0);
        }
    </style>
</head>
<body>
    <!-- Экран входа -->
    <div id="login-screen">
        <div class="login-card">
            <h1>🔥 MESSENGER PRO</h1>
            <input type="text" id="login-username" class="login-input" placeholder="Твой ник" autofocus>
            <button class="login-btn" onclick="login()">ВОЙТИ В ЧАТ</button>
            <div id="login-error" class="error"></div>
        </div>
    </div>

    <!-- Основной интерфейс -->
    <div id="app" style="display: none;">
        <!-- Сайдбар -->
        <div id="sidebar">
            <div id="sidebar-header">
                <h2>🔥 MESSENGER</h2>
                <div id="user-profile">
                    <div id="user-avatar">👤</div>
                    <div id="user-info">
                        <h4 id="username-display"></h4>
                        <div id="user-status">🟢 В сети</div>
                    </div>
                </div>
            </div>
            
            <div id="online-users">
                <div class="online-title">КОНТАКТЫ</div>
                <div id="users-list"></div>
            </div>
        </div>

        <!-- Основной чат -->
        <div id="main">
            <div id="chat-header">
                <div id="chat-info">
                    <h3 id="current-chat">Общий чат</h3>
                    <span id="online-count">0 участников</span>
                </div>
                <div id="call-controls">
                    <button class="call-btn" onclick="toggleEmojiPicker()">😊</button>
                    <button class="call-btn" onclick="startVoiceCall()">🎤</button>
                </div>
            </div>

            <div id="messages-area"></div>

            <div id="input-area">
                <div id="message-form">
                    <div id="message-wrapper">
                        <textarea id="message-input" placeholder="Напиши сообщение..." rows="1"></textarea>
                        <div class="input-actions">
                            <button class="input-action" onclick="toggleEmojiPicker()">😊</button>
                        </div>
                    </div>
                    <button id="send-btn" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Эмодзи пикер -->
    <div id="emoji-picker"></div>

    <!-- Панель звонка -->
    <div id="call-panel">
        <div id="call-avatar">👤</div>
        <div id="call-name"></div>
        <div id="call-status">Ожидание...</div>
        <div id="call-buttons">
            <button class="call-action-btn accept" onclick="acceptCall()">📞</button>
            <button class="call-action-btn reject" onclick="rejectCall()">❌</button>
        </div>
    </div>

    <!-- Уведомления -->
    <div id="notification">
        <span id="notification-text"></span>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // ========== НАСТРОЙКИ ==========
        const socket = io();
        let currentUser = null;
        let users = [];
        let messages = [];
        let currentCall = null;
        let peerConnection = null;
        let localStream = null;
        
        // Эмодзи
        const emojis = ['😀', '😂', '😍', '🥰', '😎', '😭', '😡', '👍', '👎', '🔥', '✨', '⭐', 
                       '❤️', '🧡', '💛', '💚', '💙', '💜', '🖤', '🤍', '🎉', '🎊', '🎈', '🎁',
                       '🐱', '🐶', '🐼', '🐨', '🦊', '🐸', '🐧', '🐦', '⚽', '🏀', '🏈', '🎮',
                       '🍕', '🍔', '🍟', '🌭', '🍿', '🧂', '🥤', '☕', '🍺', '🍻', '🥂', '🍷'];

        // ========== ВХОД ==========
        function login() {
            const username = document.getElementById('login-username').value.trim();
            
            if (!username) {
                showError('Введи ник!');
                return;
            }
            
            if (username.length < 2) {
                showError('Слишком короткий ник');
                return;
            }
            
            currentUser = username;
            socket.emit('join', username);
        }

        // ========== ПОЛЬЗОВАТЕЛИ (ИСПРАВЛЕНО) ==========
        socket.on('users', (onlineUsers) => {
            console.log('👥 Получен список пользователей:', onlineUsers);
            users = onlineUsers.filter(u => u !== currentUser);
            updateUsersList();
            document.getElementById('online-count').textContent = users.length + ' участников';
        });

        // ========== ВХОД УСПЕШЕН (ИСПРАВЛЕНО) ==========
        socket.on('join_success', () => {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('username-display').textContent = currentUser;
            
            // ЗАПРАШИВАЕМ СПИСОК ПОЛЬЗОВАТЕЛЕЙ
            socket.emit('get-users');
            
            showNotification('Добро пожаловать!', 'success');
        });

        socket.on('join_error', (error) => {
            showError(error);
        });

        function updateUsersList() {
            const list = document.getElementById('users-list');
            if (!list) return;
            
            list.innerHTML = users.map(user => `
                <div class="user-item" onclick="selectUser('${user}')">
                    <div class="user-avatar-small">👤</div>
                    <span>${user}</span>
                    <div class="user-dot"></div>
                </div>
            `).join('');
        }

        function selectUser(user) {
            console.log('Выбран пользователь:', user);
            // Здесь можно добавить логику для выбора пользователя
        }

        // ========== СООБЩЕНИЯ ==========
        socket.on('message', (data) => {
            addMessage(data);
        });

        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            
            if (text) {
                socket.emit('message', text);
                input.value = '';
            }
        }

        function addMessage(data) {
            const messagesArea = document.getElementById('messages-area');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${data.username === currentUser ? 'own' : ''}`;
            
            const time = new Date().toLocaleTimeString();
            
            // Проверяем, содержит ли сообщение только эмодзи
            const isOnlyEmoji = /^[\p{Emoji}\s]+$/u.test(data.text);
            
            messageDiv.innerHTML = `
                <div class="message-avatar">👤</div>
                <div class="message-content">
                    <div class="message-header">
                        <span class="message-author">${data.username}</span>
                        <span class="message-time">${time}</span>
                    </div>
                    <div class="message-text ${isOnlyEmoji ? 'message-emoji' : ''}">${data.text}</div>
                </div>
            `;
            
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        // ========== ЭМОДЗИ ==========
        function toggleEmojiPicker() {
            const picker = document.getElementById('emoji-picker');
            
            if (picker.style.display === 'grid') {
                picker.style.display = 'none';
            } else {
                picker.style.display = 'grid';
                
                if (picker.children.length === 0) {
                    emojis.forEach(emoji => {
                        const emojiDiv = document.createElement('div');
                        emojiDiv.className = 'emoji-item';
                        emojiDiv.textContent = emoji;
                        emojiDiv.onclick = () => insertEmoji(emoji);
                        picker.appendChild(emojiDiv);
                    });
                }
            }
        }

        function insertEmoji(emoji) {
            const input = document.getElementById('message-input');
            input.value += emoji;
            document.getElementById('emoji-picker').style.display = 'none';
        }

        // ========== ЗВОНКИ ==========
        const servers = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        async function startVoiceCall() {
            try {
                if (users.length === 0) {
                    showNotification('Нет пользователей онлайн!', 'error');
                    return;
                }

                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    showNotification('✅ Микрофон подключен', 'success');
                } catch (micErr) {
                    showNotification('❌ Нет доступа к микрофону! Разреши в браузере', 'error');
                    return;
                }
                
                peerConnection = new RTCPeerConnection(servers);
                
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });

                const targetUser = users[0];
                
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                
                socket.emit('call-user', {
                    to: targetUser,
                    offer: offer,
                    from: currentUser
                });

                showCallPanel('Звонок ' + targetUser, '⏳ Вызываем...');
                currentCall = {
                    type: 'outgoing',
                    to: targetUser
                };
                
                setTimeout(() => {
                    if (currentCall?.type === 'outgoing') {
                        endCall();
                        showNotification('Абонент не ответил', 'info');
                    }
                }, 30000);
                
            } catch (err) {
                console.error('Ошибка звонка:', err);
                showNotification('Ошибка при звонке: ' + err.message, 'error');
            }
        }

        socket.on('incoming-call', async (data) => {
            console.log('📞 Входящий звонок от:', data.from);
            
            if (currentCall) {
                socket.emit('call-busy', { to: data.from });
                return;
            }
            
            showNotification(`📞 Входящий звонок от ${data.from}`, 'info');
            
            document.getElementById('call-name').textContent = `📞 ${data.from}`;
            document.getElementById('call-status').textContent = '🔔 Входящий звонок...';
            document.getElementById('call-panel').style.display = 'block';
            
            currentCall = {
                type: 'incoming',
                from: data.from,
                offer: data.offer
            };
        });

        async function acceptCall() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                peerConnection = new RTCPeerConnection(servers);
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });

                await peerConnection.setRemoteDescription(currentCall.offer);
                
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                
                socket.emit('accept-call', {
                    to: currentCall.from,
                    answer: answer
                });

                document.getElementById('call-status').textContent = '✅ Разговор...';
                showNotification('Разговор начат!', 'success');
                setupCallEvents();
                
            } catch (err) {
                showNotification('Ошибка при ответе', 'error');
            }
        }

        function rejectCall() {
            if (currentCall) {
                socket.emit('reject-call', { to: currentCall.from });
            }
            endCall();
            showNotification('Звонок отклонен', 'info');
        }

        socket.on('call-accepted', async (data) => {
            console.log('✅ Звонок принят!');
            await peerConnection.setRemoteDescription(data.answer);
            document.getElementById('call-status').textContent = '✅ Разговор...';
            showNotification('Разговор начат!', 'success');
            setupCallEvents();
        });

        socket.on('call-rejected', () => {
            console.log('❌ Звонок отклонен');
            endCall();
            showNotification('Звонок отклонен', 'info');
        });

        socket.on('call-busy', () => {
            console.log('⏳ Абонент занят');
            endCall();
            showNotification('Абонент занят', 'info');
        });

        socket.on('ice-candidate', (data) => {
            if (peerConnection) {
                peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        });

        function endCall() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            if (peerConnection) {
                peerConnection.close();
            }
            
            document.getElementById('call-panel').style.display = 'none';
            currentCall = null;
            localStream = null;
            peerConnection = null;
        }

        function setupCallEvents() {
            peerConnection.ontrack = (event) => {
                console.log('Разговор начался');
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate && currentCall) {
                    const target = currentCall.type === 'outgoing' ? currentCall.to : currentCall.from;
                    socket.emit('ice-candidate', {
                        to: target,
                        candidate: event.candidate
                    });
                }
            };

            peerConnection.onconnectionstatechange = () => {
                if (peerConnection.connectionState === 'disconnected') {
                    endCall();
                    showNotification('Звонок завершен', 'info');
                }
            };
        }

        function showCallPanel(title, status) {
            document.getElementById('call-name').textContent = title;
            document.getElementById('call-status').textContent = status;
            document.getElementById('call-panel').style.display = 'block';
        }

        // ========== УВЕДОМЛЕНИЯ ==========
        function showNotification(text, type = 'info') {
            const notification = document.getElementById('notification');
            document.getElementById('notification-text').textContent = text;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        function showError(text) {
            const errorDiv = document.getElementById('login-error');
            errorDiv.textContent = text;
            errorDiv.style.display = 'block';
        }

        // ========== СОБЫТИЯ ==========
        document.getElementById('message-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('#emoji-picker') && !e.target.closest('.input-action')) {
                document.getElementById('emoji-picker').style.display = 'none';
            }
        });
    </script>
</body>
</html>
