<!DOCTYPE html>
<html>
<head>
    <title>Online Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }
        #chat {
            width: 800px;
            height: 600px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        #messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f5f5f5;
        }
        .message {
            margin: 10px 0;
            padding: 10px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .message .name {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .message .time {
            font-size: 11px;
            color: #999;
            float: right;
        }
        #input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }
        #message-input {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 10px;
            outline: none;
        }
        #message-input:focus {
            border-color: #667eea;
        }
        #send-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        #users {
            padding: 10px 20px;
            background: #f0f0f0;
            border-bottom: 1px solid #ddd;
        }
        #login {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 300px;
            text-align: center;
        }
        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
        }
        .login-box button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="login">
        <div class="login-box">
            <h2>Вход в чат</h2>
            <input type="text" id="username" placeholder="Твой ник">
            <input type="text" id="room" placeholder="Комната (например: games)">
            <button onclick="joinChat()">Войти</button>
        </div>
    </div>

    <div id="chat" style="display: none;">
        <div id="users">👥 Загрузка...</div>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="message-input" placeholder="Напиши сообщение...">
            <button id="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let username = '';
        let room = 'general';

        function joinChat() {
            username = document.getElementById('username').value || 'Аноним';
            room = document.getElementById('room').value || 'general';
            
            socket.emit('join', { username, room });
            
            document.getElementById('login').style.display = 'none';
            document.getElementById('chat').style.display = 'flex';
        }

        socket.on('message', (data) => {
            addMessage(data);
        });

        socket.on('userList', (users) => {
            document.getElementById('users').innerHTML = '👥 Онлайн: ' + users.join(', ');
        });

        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            
            if (text) {
                socket.emit('message', text);
                input.value = '';
            }
        }

        function addMessage(data) {
            const messages = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            
            const time = new Date().toLocaleTimeString();
            
            msgDiv.innerHTML = `
                <div class="name">${data.username}</div>
                <div class="time">${time}</div>
                <div>${data.text}</div>
            `;
            
            messages.appendChild(msgDiv);
            messages.scrollTop = messages.scrollHeight;
        }

        document.getElementById('message-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
