<!DOCTYPE html>
<html>
<head>
    <title>NEYROCHAT - Общайся с друзьями</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #0a0a1a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app {
            width: 100%;
            max-width: 1200px;
            height: 100vh;
            background: #1a1a2e;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* Левая панель */
        #chats-panel {
            width: 350px;
            background: #0f0f1f;
            border-right: 1px solid #2a2a3a;
            display: flex;
            flex-direction: column;
        }

        #profile-header {
            padding: 20px;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #2a2a3a;
        }

        #profile-avatar {
            width: 50px;
            height: 50px;
            background: #4a9c4a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }

        #profile-name {
            flex: 1;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        #chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin: 5px 0;
            background: #1a1a2e;
            border-radius: 15px;
            cursor: pointer;
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            background: #4a9c4a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            margin-right: 12px;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            color: white;
            font-weight: bold;
            margin-bottom: 5px;
        }

        /* Правая панель */
        #chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f0f1f;
        }

        #chat-header {
            padding: 15px 25px;
            background: #1a1a2e;
            border-bottom: 1px solid #2a2a3a;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #chat-avatar {
            width: 45px;
            height: 45px;
            background: #4a9c4a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        #chat-name {
            color: white;
            font-weight: bold;
        }

        #messages-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 70%;
        }

        .message.own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-content {
            background: #1a1a2e;
            padding: 12px 16px;
            border-radius: 18px;
            color: white;
        }

        .message.own .message-content {
            background: #4a9c4a;
        }

        .message-time {
            color: rgba(255,255,255,0.5);
            font-size: 10px;
            margin-top: 5px;
            text-align: right;
        }

        #input-area {
            padding: 20px;
            background: #1a1a2e;
            border-top: 1px solid #2a2a3a;
        }

        #message-form {
            display: flex;
            gap: 10px;
        }

        #message-input {
            flex: 1;
            padding: 12px 20px;
            background: #2a2a3a;
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        #send-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: #4a9c4a;
            color: white;
            font-size: 20px;
            cursor: pointer;
            border-radius: 50%;
        }

        /* Экран входа */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h1 {
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .login-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: #f0f0f0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .tab-btn.active {
            background: #4a9c4a;
            color: white;
        }

        .login-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: #4a9c4a;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0;
        }

        .error {
            color: #ff4444;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <!-- Экран входа -->
    <div id="login-screen">
        <div class="login-card">
            <h1>🔥 NEYROCHAT</h1>
            
            <div class="login-tabs">
                <button class="tab-btn active" onclick="showTab('login')">Вход</button>
                <button class="tab-btn" onclick="showTab('register')">Регистрация</button>
            </div>
            
            <div id="login-tab">
                <input type="text" id="login-username" class="login-input" placeholder="Логин">
                <input type="password" id="login-password" class="login-input" placeholder="Пароль">
                <button class="login-btn" onclick="login()">Войти</button>
            </div>
            
            <div id="register-tab" style="display: none;">
                <input type="text" id="reg-username" class="login-input" placeholder="Логин">
                <input type="password" id="reg-password" class="login-input" placeholder="Пароль">
                <input type="password" id="reg-confirm" class="login-input" placeholder="Повтори пароль">
                <button class="login-btn" onclick="register()">Зарегистрироваться</button>
            </div>
            
            <div id="login-error" class="error"></div>
        </div>
    </div>

    <!-- Основной чат -->
    <div id="app" style="display: none;">
        <!-- Левая панель -->
        <div id="chats-panel">
            <div id="profile-header">
                <div id="profile-avatar">👤</div>
                <div id="profile-name">Загрузка...</div>
            </div>
            <div id="chats-list"></div>
        </div>
        
        <!-- Правая панель -->
        <div id="chat-panel">
            <div id="chat-header">
                <div id="chat-avatar">👤</div>
                <div id="chat-name">Выберите чат</div>
            </div>
            <div id="messages-area"></div>
            <div id="input-area">
                <div id="message-form">
                    <input type="text" id="message-input" placeholder="Напишите сообщение...">
                    <button id="send-btn" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUser = null;
        let currentChat = null;
        let users = [];

        // ========== ВКЛАДКИ ==========
        function showTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('login-tab').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('register-tab').style.display = tab === 'register' ? 'block' : 'none';
        }

        // ========== РЕГИСТРАЦИЯ ==========
        function register() {
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;

            if (password !== confirm) {
                showError('Пароли не совпадают');
                return;
            }

            socket.emit('register', { username, password });
        }

        socket.on('register_success', () => {
            showError('Регистрация успешна! Теперь войдите');
            showTab('login');
        });

        socket.on('register_error', (error) => {
            showError(error);
        });

        // ========== ВХОД ==========
        function login() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            socket.emit('login', { username, password });
        }

        socket.on('login_success', (user) => {
            currentUser = user;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('profile-name').textContent = user.username;
            document.getElementById('profile-avatar').style.background = user.avatarColor || '#4a9c4a';
            
            socket.emit('get-users');
        });

        socket.on('login_error', (error) => {
            showError(error);
        });

        // ========== ПОЛЬЗОВАТЕЛИ ==========
        socket.on('users-list', (usersList) => {
            users = usersList;
            renderUsers();
        });

        function renderUsers() {
            const list = document.getElementById('chats-list');
            list.innerHTML = users.map(user => `
                <div class="chat-item" onclick="openChat('${user.id}')">
                    <div class="chat-avatar" style="background: ${user.avatarColor || '#4a9c4a'}">👤</div>
                    <div class="chat-info">
                        <div class="chat-name">${user.username}</div>
                    </div>
                </div>
            `).join('');
        }

        function openChat(userId) {
            currentChat = userId;
            const user = users.find(u => u.id == userId);
            document.getElementById('chat-name').textContent = user.username;
            document.getElementById('chat-avatar').style.background = user.avatarColor || '#4a9c4a';
            
            socket.emit('get-messages', userId);
        }

        // ========== СООБЩЕНИЯ ==========
        socket.on('messages-list', (messages) => {
            const area = document.getElementById('messages-area');
            area.innerHTML = messages.map(msg => {
                const isOwn = msg.fromUser == currentUser.id;
                return `
                    <div class="message ${isOwn ? 'own' : ''}">
                        <div class="message-content">
                            <div>${msg.text}</div>
                            <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>
                        </div>
                    </div>
                `;
            }).join('');
            area.scrollTop = area.scrollHeight;
        });

        socket.on('new-message', (msg) => {
            if (msg.from == currentChat || msg.to == currentChat) {
                const area = document.getElementById('messages-area');
                const isOwn = msg.from == currentUser.id;
                area.innerHTML += `
                    <div class="message ${isOwn ? 'own' : ''}">
                        <div class="message-content">
                            <div>${msg.text}</div>
                            <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>
                        </div>
                    </div>
                `;
                area.scrollTop = area.scrollHeight;
            }
        });

        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            
            if (text && currentChat) {
                socket.emit('send-message', {
                    to: currentChat,
                    text: text
                });
                input.value = '';
            }
        }

        // ========== УТИЛИТЫ ==========
        function showError(text) {
            document.getElementById('login-error').textContent = text;
        }

        document.getElementById('message-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
