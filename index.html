<!DOCTYPE html>
<html>
<head>
    <title>NEYROCHAT - Общайся с друзьями</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4a9c4a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="NEYROCHAT">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/134/134914.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #0a0a1a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app {
            width: 100%;
            max-width: 1200px;
            height: 100vh;
            background: #1a1a2e;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* Левая панель */
        #chats-panel {
            width: 350px;
            background: #0f0f1f;
            border-right: 1px solid #2a2a3a;
            display: flex;
            flex-direction: column;
        }

        #profile-header {
            padding: 20px;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #2a2a3a;
        }

        #profile-avatar {
            width: 50px;
            height: 50px;
            background: #4a9c4a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }

        #profile-name {
            flex: 1;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        #profile-status {
            color: #4a9c4a;
            font-size: 12px;
        }

        #header-buttons {
            display: flex;
            gap: 10px;
        }

        .header-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: #2a2a3a;
            color: white;
            font-size: 20px;
            cursor: pointer;
            border-radius: 50%;
        }

        #chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin: 5px 0;
            background: #1a1a2e;
            border-radius: 15px;
            cursor: pointer;
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            background: #4a9c4a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            margin-right: 12px;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            color: white;
            font-weight: bold;
        }

        /* Правая панель */
        #chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f0f1f;
        }

        #chat-header {
            padding: 15px 25px;
            background: #1a1a2e;
            border-bottom: 1px solid #2a2a3a;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #chat-avatar {
            width: 45px;
            height: 45px;
            background: #4a9c4a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        #chat-info {
            flex: 1;
        }

        #chat-name {
            color: white;
            font-weight: bold;
        }

        #chat-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: #2a2a3a;
            color: white;
            font-size: 20px;
            cursor: pointer;
            border-radius: 50%;
        }

        #messages-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 70%;
        }

        .message.own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-content {
            background: #1a1a2e;
            padding: 12px 16px;
            border-radius: 18px;
            color: white;
        }

        .message.own .message-content {
            background: #4a9c4a;
        }

        .message-time {
            color: rgba(255,255,255,0.5);
            font-size: 10px;
            margin-top: 5px;
        }

        #input-area {
            padding: 20px;
            background: #1a1a2e;
            border-top: 1px solid #2a2a3a;
        }

        #message-form {
            display: flex;
            gap: 10px;
        }

        #message-input {
            flex: 1;
            padding: 12px 20px;
            background: #2a2a3a;
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        #send-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: #4a9c4a;
            color: white;
            font-size: 20px;
            cursor: pointer;
            border-radius: 50%;
        }

        /* Экран входа */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h1 {
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .login-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: #f0f0f0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .tab-btn.active {
            background: #4a9c4a;
            color: white;
        }

        .login-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: #4a9c4a;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .error {
            color: #ff4444;
            margin-top: 10px;
        }

        #notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2c3e50;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 2000;
        }

        #notification.show {
            transform: translateX(0);
        }

        @media (max-width: 768px) {
            #chats-panel {
                position: absolute;
                width: 100%;
                height: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Экран входа -->
    <div id="login-screen">
        <div class="login-card">
            <h1>🔥 NEYROCHAT</h1>
            
            <div class="login-tabs">
                <button class="tab-btn active" onclick="showTab('login')">Вход</button>
                <button class="tab-btn" onclick="showTab('register')">Регистрация</button>
            </div>
            
            <div id="login-tab">
                <input type="text" id="login-username" class="login-input" placeholder="Логин">
                <input type="password" id="login-password" class="login-input" placeholder="Пароль">
                <div class="remember-me">
                    <input type="checkbox" id="remember-me" checked>
                    <label for="remember-me">Запомнить меня</label>
                </div>
                <button class="login-btn" onclick="login()">Войти</button>
            </div>
            
            <div id="register-tab" style="display: none;">
                <input type="text" id="reg-username" class="login-input" placeholder="Логин">
                <input type="password" id="reg-password" class="login-input" placeholder="Пароль">
                <input type="password" id="reg-confirm" class="login-input" placeholder="Повтори пароль">
                <button class="login-btn" onclick="register()">Зарегистрироваться</button>
            </div>
            
            <div id="login-error" class="error"></div>
        </div>
    </div>

    <!-- Основной интерфейс -->
    <div id="app" style="display: none;">
        <div id="chats-panel">
            <div id="profile-header">
                <div id="profile-avatar">👤</div>
                <div>
                    <div id="profile-name">Загрузка...</div>
                    <div id="profile-status">🟢 Онлайн</div>
                </div>
                <div id="header-buttons">
                    <button class="header-btn" onclick="showAddFriend()">➕</button>
                    <button class="header-btn" onclick="logout()">🚪</button>
                </div>
            </div>
            <div id="chats-list"></div>
        </div>
        
        <div id="chat-panel">
            <div id="chat-header">
                <div id="chat-avatar">👤</div>
                <div id="chat-info">
                    <div id="chat-name">Выберите чат</div>
                </div>
                <div id="chat-actions">
                    <button class="action-btn" onclick="toggleEmojiPicker()">😊</button>
                </div>
            </div>
            <div id="messages-area"></div>
            <div id="input-area">
                <div id="message-form">
                    <input type="text" id="message-input" placeholder="Напишите сообщение...">
                    <button id="send-btn" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Эмодзи пикер -->
    <div id="emoji-picker"></div>

    <!-- Уведомления -->
    <div id="notification">
        <span id="notification-text"></span>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUser = null;
        let currentChat = null;
        let users = [];
        let messages = [];

        // ========== ВКЛАДКИ ==========
        function showTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('login-tab').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('register-tab').style.display = tab === 'register' ? 'block' : 'none';
        }

        // ========== РЕГИСТРАЦИЯ ==========
        function register() {
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;

            if (!username || !password) {
                alert('Заполните все поля');
                return;
            }

            if (password !== confirm) {
                alert('Пароли не совпадают');
                return;
            }

            socket.emit('register', { username, password });
        }

        socket.on('register_success', () => {
            alert('Регистрация успешна! Теперь войдите');
            showTab('login');
        });

        socket.on('register_error', (error) => {
            alert(error);
        });

        // ========== ВХОД ==========
        function login() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            if (!username || !password) {
                alert('Заполните все поля');
                return;
            }

            socket.emit('login', { username, password });
        }

        socket.on('login_success', (user) => {
            currentUser = user;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('profile-name').textContent = user.username;
            
            socket.emit('get-users');
        });

        socket.on('login_error', (error) => {
            alert(error);
        });

        // ========== ПОЛЬЗОВАТЕЛИ ==========
        socket.on('users-list', (usersList) => {
            users = usersList;
            renderUsers();
        });

        function renderUsers() {
            const list = document.getElementById('chats-list');
            list.innerHTML = users.map(user => `
                <div class="chat-item" onclick="openChat('${user.id}')">
                    <div class="chat-avatar">👤</div>
                    <div class="chat-info">
                        <div class="chat-name">${user.username}</div>
                    </div>
                </div>
            `).join('');
        }

        function openChat(userId) {
            currentChat = userId;
            const user = users.find(u => u.id == userId);
            document.getElementById('chat-name').textContent = user.username;
            socket.emit('get-messages', userId);
        }

        // ========== СООБЩЕНИЯ ==========
        socket.on('messages-list', (msgs) => {
            messages = msgs;
            renderMessages();
        });

        socket.on('new-message', (msg) => {
            messages.push(msg);
            if (msg.from == currentChat || msg.to == currentChat) {
                renderMessages();
            }
        });

        function renderMessages() {
            const area = document.getElementById('messages-area');
            area.innerHTML = messages
                .filter(msg => msg.from == currentChat || msg.to == currentChat)
                .map(msg => {
                    const isOwn = msg.from == currentUser?.id;
                    return `
                        <div class="message ${isOwn ? 'own' : ''}">
                            <div class="message-content">
                                <div>${msg.text}</div>
                                <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            area.scrollTop = area.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            
            if (text && currentChat) {
                socket.emit('send-message', {
                    to: currentChat,
                    text: text
                });
                input.value = '';
            }
        }

        // ========== ВЫХОД ==========
        function logout() {
            localStorage.removeItem('neyrochat_user');
            location.reload();
        }

        // ========== УВЕДОМЛЕНИЯ ==========
        function showNotification(text) {
            const notification = document.getElementById('notification');
            document.getElementById('notification-text').textContent = text;
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // ========== СОБЫТИЯ ==========
        document.getElementById('message-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // ========== PWA ==========
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
