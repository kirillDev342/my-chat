<!DOCTYPE html>
<html>
<head>
    <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4a9c4a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="NEYROCHAT">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/134/134914.png">
    <title>NEYROCHAT - Общайся с друзьями</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #0a0a1a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app {
            width: 100%;
            max-width: 1200px;
            height: 100vh;
            background: #1a1a2e;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* Левая панель - чаты */
        #chats-panel {
            width: 350px;
            background: #0f0f1f;
            border-right: 1px solid #2a2a3a;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        #profile-header {
            padding: 20px;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #2a2a3a;
        }

        #profile-avatar {
            width: 50px;
            height: 50px;
            background: #4a9c4a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        #profile-name {
            flex: 1;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        #profile-status {
            color: #4a9c4a;
            font-size: 12px;
        }

        #header-buttons {
            display: flex;
            gap: 10px;
        }

        .header-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: #2a2a3a;
            color: white;
            font-size: 20px;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .header-btn:hover {
            background: #4a9c4a;
            transform: scale(1.1);
        }

        #search-section {
            padding: 15px 20px;
        }

        #search-input {
            width: 100%;
            padding: 12px 20px;
            background: #1a1a2e;
            border: 1px solid #2a2a3a;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        #search-input:focus {
            border-color: #4a9c4a;
        }

        #chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin: 5px 0;
            background: #1a1a2e;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .chat-item:hover {
            background: #2a2a3a;
            transform: translateX(5px);
        }

        .chat-item.active {
            background: linear-gradient(135deg, #4a9c4a20, #2ecc7120);
            border-left: 4px solid #4a9c4a;
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            background: #4a9c4a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            margin-right: 12px;
            position: relative;
        }

        .online-indicator {
            width: 12px;
            height: 12px;
            background: #4a9c4a;
            border: 2px solid #1a1a2e;
            border-radius: 50%;
            position: absolute;
            bottom: 2px;
            right: 2px;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            color: white;
            font-weight: bold;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .chat-last-message {
            color: #888;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .chat-time {
            color: #888;
            font-size: 10px;
        }

        .unread-badge {
            background: #4a9c4a;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 20px;
            text-align: center;
        }

        /* Правая панель - чат */
        #chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f0f1f;
            position: relative;
        }

        #chat-header {
            padding: 15px 25px;
            background: #1a1a2e;
            border-bottom: 1px solid #2a2a3a;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #back-btn {
            display: none;
            width: 40px;
            height: 40px;
            border: none;
            background: #2a2a3a;
            color: white;
            font-size: 24px;
            cursor: pointer;
            border-radius: 50%;
        }

        #chat-avatar {
            width: 45px;
            height: 45px;
            background: #4a9c4a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        #chat-info {
            flex: 1;
        }

        #chat-name {
            color: white;
            font-weight: bold;
            margin-bottom: 3px;
        }

        #chat-status {
            color: #4a9c4a;
            font-size: 12px;
        }

        #chat-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: #2a2a3a;
            color: white;
            font-size: 20px;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: #4a9c4a;
            transform: scale(1.1);
        }

        #messages-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 80%;
            animation: fadeIn 0.3s;
        }

        .message.own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-avatar {
            width: 35px;
            height: 35px;
            background: #4a9c4a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message-content {
            background: #1a1a2e;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
        }

        .message.own .message-content {
            background: #4a9c4a;
        }

        .message-text {
            color: white;
            font-size: 14px;
            word-break: break-word;
        }

        .message-time {
            color: rgba(255,255,255,0.5);
            font-size: 10px;
            margin-top: 5px;
            text-align: right;
        }

        .message-status {
            display: inline-block;
            margin-left: 5px;
        }

        .message-reactions {
            display: flex;
            gap: 5px;
            margin-top: 5px;
            flex-wrap: wrap;
        }

        .reaction {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 2px 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reaction:hover {
            background: #4a9c4a;
        }

        .reaction.active {
            background: #4a9c4a;
        }

        .typing-indicator {
            color: #888;
            font-size: 12px;
            padding: 5px 20px;
            font-style: italic;
        }

        #input-area {
            padding: 20px;
            background: #1a1a2e;
            border-top: 1px solid #2a2a3a;
        }

        #message-form {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #attach-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: #2a2a3a;
            color: white;
            font-size: 20px;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.3s;
        }

        #attach-btn:hover {
            background: #4a9c4a;
        }

        #message-input {
            flex: 1;
            padding: 12px 20px;
            background: #2a2a3a;
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        #message-input:focus {
            background: #3a3a4a;
        }

        #send-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: #4a9c4a;
            color: white;
            font-size: 20px;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.3s;
        }

        #send-btn:hover {
            transform: scale(1.1);
            background: #2ecc71;
        }

        /* Эмодзи пикер */
        #emoji-picker {
            position: absolute;
            bottom: 100px;
            right: 30px;
            background: #1a1a2e;
            border: 2px solid #4a9c4a;
            border-radius: 15px;
            padding: 10px;
            display: none;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
            z-index: 1000;
            max-height: 200px;
            overflow-y: auto;
        }

        .emoji-item {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 5px;
            font-size: 20px;
        }

        .emoji-item:hover {
            background: #4a9c4a;
        }

        /* Экран входа */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            animation: slideUp 0.5s;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card h1 {
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 36px;
        }

        .login-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: #f0f0f0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #4a9c4a;
            color: white;
        }

        .login-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .login-input:focus {
            border-color: #4a9c4a;
            outline: none;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
            color: #666;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: #4a9c4a;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(74,156,74,0.4);
        }

        .error {
            color: #ff4444;
            margin-top: 10px;
            font-size: 14px;
        }

        /* Уведомления */
        #notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2c3e50;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 2000;
            max-width: 300px;
        }

        #notification.show {
            transform: translateX(0);
        }

        /* Адаптация для телефона */
        @media (max-width: 768px) {
            #chats-panel {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
                z-index: 10;
            }
            
            #chats-panel.hide {
                transform: translateX(-100%);
            }
            
            #chat-panel {
                width: 100%;
            }
            
            #back-btn {
                display: block;
            }
            
            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <!-- Экран входа -->
    <div id="login-screen">
        <div class="login-card">
            <h1>🔥 NEYROCHAT</h1>
            
            <div class="login-tabs">
                <button class="tab-btn active" onclick="showTab('login')">Вход</button>
                <button class="tab-btn" onclick="showTab('register')">Регистрация</button>
            </div>
            
            <div id="login-tab">
                <input type="text" id="login-username" class="login-input" placeholder="Логин">
                <input type="password" id="login-password" class="login-input" placeholder="Пароль">
                <div class="remember-me">
                    <input type="checkbox" id="remember-me" checked>
                    <label for="remember-me">Запомнить меня</label>
                </div>
                <button class="login-btn" onclick="login()">Войти</button>
            </div>
            
            <div id="register-tab" style="display: none;">
                <input type="text" id="reg-username" class="login-input" placeholder="Логин">
                <input type="password" id="reg-password" class="login-input" placeholder="Пароль">
                <input type="password" id="reg-confirm" class="login-input" placeholder="Повтори пароль">
                <button class="login-btn" onclick="register()">Зарегистрироваться</button>
            </div>
            
            <div id="login-error" class="error"></div>
        </div>
    </div>

    <!-- Основной интерфейс -->
    <div id="app" style="display: none;">
        <!-- Левая панель -->
        <div id="chats-panel">
            <div id="profile-header">
                <div id="profile-avatar" onclick="showProfile()">👤</div>
                <div>
                    <div id="profile-name">Загрузка...</div>
                    <div id="profile-status">🟢 Онлайн</div>
                </div>
                <div id="header-buttons">
                    <button class="header-btn" onclick="showAddFriend()">➕</button>
                    <button class="header-btn" onclick="logout()">🚪</button>
                </div>
            </div>
            
            <div id="search-section">
                <input type="text" id="search-input" placeholder="🔍 Поиск по чатам...">
            </div>
            
            <div id="chats-list"></div>
        </div>
        
        <!-- Правая панель -->
        <div id="chat-panel">
            <div id="chat-header">
                <button id="back-btn" onclick="backToChats()">←</button>
                <div id="chat-avatar">👤</div>
                <div id="chat-info">
                    <div id="chat-name">Выберите чат</div>
                    <div id="chat-status"></div>
                </div>
                <div id="chat-actions">
                    <button class="action-btn" onclick="toggleEmojiPicker()">😊</button>
                    <button class="action-btn" onclick="startCall()">🎤</button>
                </div>
            </div>
            
            <div id="messages-area"></div>
            
            <div id="typing-indicator" class="typing-indicator"></div>
            
            <div id="input-area">
                <div id="message-form">
                    <button id="attach-btn" onclick="toggleEmojiPicker()">😊</button>
                    <input type="text" id="message-input" placeholder="Напишите сообщение...">
                    <button id="send-btn" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Эмодзи пикер -->
    <div id="emoji-picker"></div>

    <!-- Уведомления -->
    <div id="notification">
        <span id="notification-text"></span>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // ========== НАСТРОЙКИ ==========
        const socket = io();
        let currentUser = null;
        let currentChat = null;
        let users = [];
        let messages = [];
        let typingTimer = null;
        
        // Эмодзи
        const emojis = ['😀', '😂', '😍', '🥰', '😎', '😭', '😡', '👍', '👎', '🔥', '✨', '❤️', 
                       '💔', '⭐', '🎉', '🎊', '🎈', '🎁', '🐱', '🐶', '🐼', '🐨', '🦊'];

        // ========== БОТ ДЛЯ ПИНГА (НЕ ДАЕТ СЕРВЕРУ УСНУТЬ) ==========
        setInterval(() => {
            if (document.hidden) {
                fetch('/ping').catch(() => {});
                console.log('Пинг отправлен');
            }
        }, 5 * 60 * 1000); // Каждые 5 минут

        // ========== СОХРАНЕНИЕ ВХОДА ==========
        const savedUser = localStorage.getItem('neyrochat_user');
        if (savedUser) {
            try {
                const userData = JSON.parse(savedUser);
                socket.emit('auto-login', userData.id);
            } catch (e) {
                localStorage.removeItem('neyrochat_user');
            }
        }

        // ========== АВТОМАТИЧЕСКИЙ ВХОД ==========
        socket.on('auto-login-success', (user) => {
            currentUser = user;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('profile-name').textContent = user.username;
            document.getElementById('profile-avatar').style.background = user.avatarColor || '#4a9c4a';
            
            showNotification(`✅ С возвращением, ${user.username}!`);
            socket.emit('get-users');
            startPing();
        });

        // ========== ВКЛАДКИ ==========
        function showTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('login-tab').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('register-tab').style.display = tab === 'register' ? 'block' : 'none';
        }

        // ========== РЕГИСТРАЦИЯ ==========
        function register() {
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;

            if (!username || !password) {
                showError('Заполните все поля');
                return;
            }

            if (username.length < 3) {
                showError('Логин должен быть минимум 3 символа');
                return;
            }

            if (password.length < 3) {
                showError('Пароль должен быть минимум 3 символа');
                return;
            }

            if (password !== confirm) {
                showError('Пароли не совпадают');
                return;
            }

            socket.emit('register', { username, password });
        }

        socket.on('register_success', () => {
            showNotification('✅ Регистрация успешна! Теперь войдите');
            showTab('login');
        });

        socket.on('register_error', (error) => {
            showError(error);
        });

        // ========== ВХОД ==========
        function login() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            const remember = document.getElementById('remember-me').checked;

            if (!username || !password) {
                showError('Заполните все поля');
                return;
            }

            socket.emit('login', { username, password, remember });
        }

        socket.on('login_success', (user) => {
            currentUser = user;
            
            // Сохраняем если нужно
            if (user.remember) {
                localStorage.setItem('neyrochat_user', JSON.stringify({
                    id: user.id,
                    username: user.username,
                    avatarColor: user.avatarColor
                }));
            }
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('profile-name').textContent = user.username;
            document.getElementById('profile-avatar').style.background = user.avatarColor || '#4a9c4a';
            
            showNotification(`✅ Добро пожаловать, ${user.username}!`);
            socket.emit('get-users');
            startPing();
        });

        socket.on('login_error', (error) => {
            showError(error);
        });

        // ========== ВЫХОД ==========
        function logout() {
            localStorage.removeItem('neyrochat_user');
            location.reload();
        }

        // ========== ПОЛЬЗОВАТЕЛИ ==========
        socket.on('users-list', (usersList) => {
            users = usersList;
            renderUsers();
        });

        socket.on('user-online', (userId) => {
            const user = users.find(u => u.id == userId);
            if (user) user.online = true;
            renderUsers();
        });

        socket.on('user-offline', (userId) => {
            const user = users.find(u => u.id == userId);
            if (user) user.online = false;
            renderUsers();
        });

        function renderUsers() {
            const list = document.getElementById('chats-list');
            const searchQuery = document.getElementById('search-input').value.toLowerCase();
            
            let filteredUsers = users;
            if (searchQuery) {
                filteredUsers = users.filter(u => u.username.toLowerCase().includes(searchQuery));
            }
            
            list.innerHTML = filteredUsers.map(user => {
                const lastMessage = messages.filter(m => 
                    (m.from == user.id && m.to == currentUser.id) || 
                    (m.to == user.id && m.from == currentUser.id)
                ).pop();
                
                return `
                    <div class="chat-item ${currentChat == user.id ? 'active' : ''}" onclick="openChat('${user.id}')">
                        <div class="chat-avatar" style="background: ${user.avatarColor || '#4a9c4a'}">
                            👤
                            ${user.online ? '<span class="online-indicator"></span>' : ''}
                        </div>
                        <div class="chat-info">
                            <div class="chat-name">
                                ${user.username}
                                <span class="chat-time">${lastMessage ? new Date(lastMessage.timestamp).toLocaleTimeString() : ''}</span>
                            </div>
                            <div class="chat-last-message">
                                ${lastMessage ? (lastMessage.from == currentUser.id ? 'Вы: ' : '') + lastMessage.text : 'Нажмите чтобы начать чат'}
                            </div>
                        </div>
                        ${user.unread ? `<span class="unread-badge">${user.unread}</span>` : ''}
                    </div>
                `;
            }).join('');
        }

        function openChat(userId) {
            currentChat = userId;
            const user = users.find(u => u.id == userId);
            
            document.getElementById('chat-name').textContent = user.username;
            document.getElementById('chat-avatar').style.background = user.avatarColor || '#4a9c4a';
            document.getElementById('chat-status').textContent = user.online ? '🟢 Онлайн' : '⚪ Офлайн';
            
            if (window.innerWidth <= 768) {
                document.getElementById('chats-panel').classList.add('hide');
            }
            
            socket.emit('get-messages', userId);
        }

        function backToChats() {
            document.getElementById('chats-panel').classList.remove('hide');
        }

        // ========== СООБЩЕНИЯ ==========
        socket.on('messages-list', (msgs) => {
            messages = msgs;
            renderMessages();
        });

        socket.on('new-message', (msg) => {
            messages.push(msg);
            
            if (msg.from == currentChat || msg.to == currentChat) {
                renderMessages();
            }
            
            if (msg.from != currentUser.id && document.hidden) {
                showNotification(`💬 ${msg.fromUsername}: ${msg.text}`);
            }
            
            renderUsers();
        });

        function renderMessages() {
            const area = document.getElementById('messages-area');
            area.innerHTML = messages
                .filter(msg => (msg.from == currentChat && msg.to == currentUser.id) || 
                              (msg.to == currentChat && msg.from == currentUser.id))
                .map(msg => {
                    const isOwn = msg.from == currentUser.id;
                    const reactions = msg.reactions ? Object.entries(msg.reactions).map(([emoji, count]) => `
                        <span class="reaction ${msg.userReaction == emoji ? 'active' : ''}" onclick="addReaction('${msg.id}', '${emoji}')">
                            ${emoji} ${count}
                        </span>
                    `).join('') : '';
                    
                    return `
                        <div class="message ${isOwn ? 'own' : ''}" id="msg-${msg.id}">
                            <div class="message-avatar" style="background: ${isOwn ? currentUser.avatarColor || '#4a9c4a' : '#4a9c4a'}">👤</div>
                            <div class="message-content" ondblclick="replyToMessage('${msg.id}', '${msg.fromUsername}', '${msg.text}')">
                                <div class="message-text">${msg.text}</div>
                                <div class="message-reactions">${reactions}</div>
                                <div class="message-time">
                                    ${new Date(msg.timestamp).toLocaleTimeString()}
                                    <span class="message-status">${isOwn ? (msg.read ? '✓✓' : '✓') : ''}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            
            area.scrollTop = area.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            
            if (text && currentChat) {
                socket.emit('send-message', {
                    to: currentChat,
                    text: text,
                    replyTo: currentReply
                });
                input.value = '';
                
                if (currentReply) {
                    document.getElementById('reply-panel').style.display = 'none';
                    currentReply = null;
                }
            }
        }

        // ========== ПЕЧАТАЕТ... ==========
        document.getElementById('message-input').addEventListener('input', () => {
            if (currentChat) {
                socket.emit('typing', { to: currentChat, typing: true });
                
                clearTimeout(typingTimer);
                typingTimer = setTimeout(() => {
                    socket.emit('typing', { to: currentChat, typing: false });
                }, 1000);
            }
        });

        socket.on('typing', (data) => {
            const indicator = document.getElementById('typing-indicator');
            if (data.typing) {
                indicator.textContent = `${data.username} печатает...`;
            } else {
                indicator.textContent = '';
            }
        });

        // ========== РЕАКЦИИ ==========
        function addReaction(messageId, emoji) {
            socket.emit('add-reaction', {
                messageId: messageId,
                emoji: emoji
            });
        }

        socket.on('message-updated', (message) => {
            const index = messages.findIndex(m => m.id == message.id);
            if (index != -1) {
                messages[index] = message;
                renderMessages();
            }
        });

        // ========== ЭМОДЗИ ==========
        function toggleEmojiPicker() {
            const picker = document.getElementById('emoji-picker');
            
            if (picker.style.display === 'grid') {
                picker.style.display = 'none';
            } else {
                picker.style.display = 'grid';
                
                if (picker.children.length === 0) {
                    emojis.forEach(emoji => {
                        const div = document.createElement('div');
                        div.className = 'emoji-item';
                        div.textContent = emoji;
                        div.onclick = () => {
                            document.getElementById('message-input').value += emoji;
                            picker.style.display = 'none';
                        };
                        picker.appendChild(div);
                    });
                }
            }
        }

        // ========== ЗВОНКИ ==========
        function startCall() {
            if (!currentChat) {
                showNotification('Выберите чат');
                return;
            }
            showNotification('🎤 Звонки пока в разработке');
        }

        // ========== ПОИСК ==========
        document.getElementById('search-input').addEventListener('input', () => {
            renderUsers();
        });

        // ========== УВЕДОМЛЕНИЯ ==========
        function showNotification(text) {
            const notification = document.getElementById('notification');
            document.getElementById('notification-text').textContent = text;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        function showError(text) {
            document.getElementById('login-error').textContent = text;
        }

        // ========== ПИНГ ДЛЯ RENDER ==========
        function startPing() {
            setInterval(() => {
                fetch('/ping').catch(() => {});
            }, 4 * 60 * 1000); // Каждые 4 минуты
        }

        // ========== СОБЫТИЯ ==========
        document.getElementById('message-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('#emoji-picker') && !e.target.closest('.action-btn')) {
                document.getElementById('emoji-picker').style.display = 'none';
            }
        });

        // Адаптация для телефона
        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                document.getElementById('chats-panel').classList.remove('hide');
            }
        });

        // Проверка подключения
        socket.on('connect', () => {
            console.log('✅ Подключено к серверу');
        });

        socket.on('disconnect', () => {
            showNotification('❌ Потеряно соединение с сервером');
        });
            <!-- Эмодзи пикер -->
    <div id="emoji-picker"></div>

    <!-- Уведомления -->
    <div id="notification">
        <span id="notification-text"></span>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // ========== ВЕСЬ ТВОЙ СТАРЫЙ КОД ЗДЕСЬ ... ==========
        
        // ========== И ПОСЛЕ НЕГО ВСТАВЬ ЭТО ==========
        
        // ========== PWA И УВЕДОМЛЕНИЯ ==========
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('✅ Service Worker готов'))
                    .catch(err => console.log('❌ Ошибка SW:', err));
            });
        }

        // Запрос разрешения на уведомления
        function requestNotificationPermission() {
            if (!('Notification' in window)) {
                console.log('❌ Уведомления не поддерживаются');
                return;
            }
            
            if (Notification.permission === 'granted') {
                console.log('✅ Уведомления уже разрешены');
                return;
            }
            
            if (Notification.permission !== 'denied') {
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        showNotification('✅ Уведомления включены!', 'Теперь вы будете получать сообщения');
                    }
                });
            }
        }

        // Добавляем кнопку уведомлений
        function addNotificationButton() {
            const chatActions = document.getElementById('chat-actions');
            if (chatActions && !document.getElementById('notif-btn')) {
                const notifBtn = document.createElement('button');
                notifBtn.id = 'notif-btn';
                notifBtn.className = 'action-btn';
                notifBtn.innerHTML = '🔔';
                notifBtn.onclick = requestNotificationPermission;
                notifBtn.title = 'Включить уведомления';
                chatActions.appendChild(notifBtn);
            }
        }

        // Запрашиваем при входе
        socket.on('login_success', (user) => {
            setTimeout(() => {
                requestNotificationPermission();
                addNotificationButton();
            }, 2000);
        });

        // Показываем уведомление при новом сообщении
        const originalMessageHandler = socket.on('new-message', (msg) => {
            if (msg.from != currentUser?.id && document.hidden) {
                if (Notification.permission === 'granted') {
                    navigator.serviceWorker.ready.then(reg => {
                        reg.showNotification(`💬 ${msg.fromUsername}`, {
                            body: msg.text,
                            icon: 'https://cdn-icons-png.flaticon.com/512/134/134914.png',
                            badge: 'https://cdn-icons-png.flaticon.com/512/134/134914.png',
                            vibrate: [200, 100, 200],
                            tag: 'chat-message',
                            data: { url: window.location.href }
                        });
                    });
                }
            }
        });

        // ========== КОНЕЦ ВСТАВКИ ==========
    </script>
</body>
</html>
    </script>
